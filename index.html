<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aMinecraft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
  #blocker {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    font-family: monospace;
    color: #fff;
    font-size: 24px;
  }
  #blocker div { text-align: center; }
  #blocker small { font-size: 14px; color: #aaa; }
  #error-log {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(0,0,0,0.85); color: #ff4444;
    font-family: monospace; font-size: 12px; padding: 8px;
    z-index: 200; white-space: pre-wrap; max-height: 200px;
    overflow-y: auto; display: none;
  }
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    width: 10px; height: 10px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    color: white; font-family: monospace; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
</style>
<script>
  window.onerror = function(msg, url, line) {
    const el = document.getElementById('error-log');
    el.textContent += 'ERROR: ' + msg + ' at ' + url + ':' + line + '\n';
    el.style.display = 'block';
  };
  window.addEventListener('unhandledrejection', function(e) {
    const el = document.getElementById('error-log');
    el.textContent += 'PROMISE: ' + e.reason + '\n';
    el.style.display = 'block';
  });
</script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="blocker">
  <div>
    Click to Play<br>
    <small>aMinecraft - Voxel Sandbox</small>
  </div>
</div>
<div id="crosshair">+</div>
<div id="error-log"></div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
